name: Deploy → Production

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag pra (re)deployar — ex: v1.1.3 (rollback)'
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false  # NUNCA cancelar deploy prod em curso

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production  # exige approval
    steps:
      - name: Checkout (tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: gh-actions-deploy-prod-${{ github.event.inputs.tag || github.ref_name }}

      - name: Sync assets to S3
        run: |
          aws s3 sync . s3://${{ vars.S3_BUCKET }} \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "docs/*" \
            --exclude "README.md" \
            --exclude ".gitignore" \
            --exclude "index.html" \
            --cache-control "public,max-age=86400" \
            --delete

      - name: Upload index.html (sem cache)
        run: |
          aws s3 cp index.html s3://${{ vars.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Anotar versão deployada
        run: |
          echo "Tag deployada: ${{ github.event.inputs.tag || github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "Disparo: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
